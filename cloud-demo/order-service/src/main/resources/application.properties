server.port=8080
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/cloud_order?useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
mybatis.type-aliases-package=com.zwm.order.pojo
mybatis.configuration.use-actual-param-name=true
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.mapper-locations=classpath*:mapper/*.xml
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
logging.pattern.dateformat=MM-dd HH:mm:ss:SSS
spring.application.name=order-service
eureka.client.service-url.defaultZone=http://127.0.0.1:10086/eureka
user-service.ribbon.NFLoadBalancerRuleClassName=com.netflix.loadbalancer.RandomRule
ribbon.eager-load.enabled=true
ribbon.eager-load.clients=user-service